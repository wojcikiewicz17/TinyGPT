name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Pack artifacts
        run: |
          mkdir -p artifacts
          tar -czf artifacts/tinygpt-demo-linux-x64.tar.gz -C build/demo TinyGPT_demo
          tar -czf artifacts/tinygpt-tests-linux-x64.tar.gz -C build/test TinyGPT_test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tinygpt-linux-artifacts
          path: artifacts/*.tar.gz
          if-no-files-found: error

  android-native-addon:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Build RafaelIA addon (armeabi-v7a + arm64-v8a + x86 + x86_64)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_API_LEVEL: "24"
          ANDROID_ABI_LIST: "armeabi-v7a arm64-v8a x86 x86_64"
        run: addons/rafaelia_core/scripts/build_android_addon.sh

      - name: Upload Android addon artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rafaelia-core-android-static-libs
          path: build-android-rafaelia/artifacts/*.a
          if-no-files-found: error
