name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (Release)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Pack artifacts
        run: |
          mkdir -p artifacts
          tar -czf artifacts/tinygpt-demo-linux-x64.tar.gz -C build/demo TinyGPT_demo
          tar -czf artifacts/tinygpt-tests-linux-x64.tar.gz -C build/test TinyGPT_test

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tinygpt-linux-artifacts
          path: artifacts/*.tar.gz
          if-no-files-found: error

  asm-only-host:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build ASM-only pipeline
        run: scripts/build_asm_only.sh

      - name: Validate ASM-only artifact
        run: test -f build-asm-only/addons/rafaelia_core/librafaelia_core.a

      - name: Pack ASM-only artifacts
        run: |
          mkdir -p artifacts
          cp build-asm-only/addons/rafaelia_core/librafaelia_core.a artifacts/librafaelia_core-host.a

      - name: Upload ASM-only artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rafaelia-core-host-asm-only
          path: artifacts/librafaelia_core-host.a
          if-no-files-found: error

  all-asm-repo:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build full repository as ASM stubs
        run: scripts/build_all_asm_repo.sh

      - name: Validate ASM manifest and artifacts
        run: |
          test -f generated/all_asm/manifest.json
          test -f build-all-asm/libtinygpt_all_asm.a
          test -f build-all-asm/addons/rafaelia_core/librafaelia_core.a

      - name: Upload full ASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tinygpt-full-asm-artifacts
          path: |
            generated/all_asm/manifest.json
            build-all-asm/libtinygpt_all_asm.a
            build-all-asm/addons/rafaelia_core/librafaelia_core.a
          if-no-files-found: error

  android-native-addon:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Build RafaelIA addon (ASM only: armeabi-v7a + arm64-v8a)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_API_LEVEL: "24"
          ANDROID_ABI_LIST: "armeabi-v7a arm64-v8a"
          RAFAELIA_REQUIRE_ASM: "1"
        run: addons/rafaelia_core/scripts/build_android_addon.sh

      - name: Validate Android addon artifacts
        env:
          ANDROID_ABI_LIST: "armeabi-v7a arm64-v8a"
        run: |
          for abi in ${ANDROID_ABI_LIST}; do
            test -f "build-android-rafaelia/artifacts/librafaelia_core-${abi}.a"
          done

      - name: Upload Android addon artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rafaelia-core-android-static-libs-asm
          path: build-android-rafaelia/artifacts/*.a
          if-no-files-found: error

  asm-shell-host:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure ASM shell only
        run: cmake -S . -B build-asm-shell -DCMAKE_BUILD_TYPE=Release -DTINYGPT_ASM_ONLY=ON

      - name: Build ASM shell only
        run: cmake --build build-asm-shell --config Release --target RafaelIA_core --parallel

      - name: Upload ASM shell artifact
        uses: actions/upload-artifact@v4
        with:
          name: rafaelia-core-host-static-lib
          path: build-asm-shell/addons/rafaelia_core/librafaelia_core.a
          if-no-files-found: error
